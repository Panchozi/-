<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Custom Poker Configurator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; padding-bottom: 60px; font-family: sans-serif; }
        .card { background: #2d2d2d; border: 1px solid #006400; border-radius: 12px; margin-bottom: 12px; padding: 15px; color: #e0e0e0; }
        .btn-poker { background: #006400; border: none; color: white; font-weight: bold; }
        .btn-poker:hover { background: #008000; }
        .note-input { background: #1a1a1a; border: 1px dashed #006400; color: #fff; margin-top: 8px; }
        .history-item { font-size: 0.75rem; border-bottom: 1px solid #333; padding: 8px; color: #aaa; }
        select, input { background: #333 !important; color: #fff !important; border: 1px solid #444 !important; }
    </style>
</head>
<body>

<div class="container mt-3">
    <h4 class="text-center" style="color: #006400; text-transform: uppercase; letter-spacing: 2px;">Custom Poker</h4>
    <div id="app-fields"></div>
    <button class="btn btn-poker w-100 py-3 shadow" onclick="saveAll()">СОХРАНИТЬ КОНФИГУРАЦИЮ</button>
    
    <div class="mt-4">
        <h6 style="color: #006400;">Последние записи:</h6>
        <div id="history-log" class="card"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxb1CMlGfwdl0-ZLumNPMhQ5gc8nVHTAk",
        authDomain: "configurator-3f340.firebaseapp.com",
        databaseURL: "https://configurator-3f340-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "configurator-3f340",
        storageBucket: "configurator-3f340.firebasestorage.app",
        messagingSenderId: "412615987048",
        appId: "1:412615987048:web:18902eae53f76637b490dd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Простое имя
    const userName = localStorage.getItem('pokerUser') || prompt("Введите ваше имя:") || "Мастер";
    localStorage.setItem('pokerUser', userName);

    const fields = [
        { id: 'podstole', name: 'Подстолье', type: 'toggle' },
        { id: 'stol', name: 'Стол', type: 'select_size', opts: ['Стандарт (2430мм х 1210мм)', 'Не стандарт'] },
        { id: 'bort', name: 'Борт', type: 'input' },
        { id: 'nakladka', name: 'Накладка', type: 'input' },
        { id: 'fleet', name: 'Флот', type: 'toggle' },
        { id: 'light', name: 'Подсветка', type: 'select', opts: ['Выкл', 'Снаружи', 'Внутри', 'По кругу'] },
        { id: 'cups', name: 'Подстаканники (Стандарт 10 шт)', type: 'select', opts: ['Стандарт (10 шт)', 'Не стандарт'] }
    ];

    const container = document.getElementById('app-fields');
    fields.forEach(f => {
        let html = `<div class="card"><label class="small fw-bold" style="color:#006400">${f.name}</label>`;
        if (f.type === 'toggle') html += `<div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="${f.id}"></div>`;
        else if (f.type === 'select' || f.type === 'select_size') {
            html += `<select class="form-select" id="${f.id}" onchange="checkSize(this)">${f.opts.map(o => `<option>${o}</option>`).join('')}</select>`;
            if(f.type === 'select_size') html += `<input class="form-control mt-2 d-none" id="custom-${f.id}" placeholder="Введите размер (мм)...">`;
        } else html += `<input class="form-control" id="${f.id}" placeholder="...">`;
        
        html += `<input class="form-control note-input" id="note-${f.id}" placeholder="Примечание..."></div>`;
        container.innerHTML += html;
    });

    function checkSize(el) {
        const customInput = document.getElementById('custom-' + el.id);
        if (el.value === 'Не стандарт') customInput.classList.remove('d-none');
        else customInput.classList.add('d-none');
    }

    function saveAll() {
        let data = { timestamp: Date.now(), user: userName, details: {} };
        fields.forEach(f => {
            const val = document.getElementById(f.id);
            const custom = document.getElementById('custom-' + f.id);
            const note = document.getElementById('note-' + f.id);
            
            let v = (f.type === 'toggle' ? (val.checked ? 'Да' : 'Нет') : val.value);
            if (custom && !custom.classList.contains('d-none')) v += ' (' + custom.value + ')';
            
            data.details[f.name] = v + (note.value ? ` [Прим: ${note.value}]` : '');
        });
        
        db.ref('history').push(data);
        alert("Конфигурация отправлена в производство!");
    }

    db.ref('history').limitToLast(5).on('value', (snapshot) => {
        const log = document.getElementById('history-log');
        log.innerHTML = '';
        snapshot.forEach(child => {
            const v = child.val();
            log.innerHTML += `<div class="history-item"><b>${v.user}</b> (${new Date(v.timestamp).toLocaleTimeString()}): ${JSON.stringify(v.details).replace(/[{}"']/g, '').replace(/,/g, ', ')}</div>`;
        });
    });
</script>
</body>
</html>
