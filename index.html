<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f0f2f5; padding-bottom: 60px; }
        .card { border-radius: 15px; margin-bottom: 12px; padding: 15px; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .history-item { font-size: 0.75rem; border-bottom: 1px solid #eee; padding: 8px; color: #555; }
    </style>
</head>
<body>

<div class="container mt-3">
    <div class="card bg-dark text-white text-center mb-3"><b>CONFIGURATOR PRO</b></div>
    <div id="app-fields"></div>
    <button class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="saveAll()">СОХРАНИТЬ КОНФИГУРАЦИЮ</button>
    
    <div class="mt-4">
        <h6>История последних сохранений:</h6>
        <div id="history-log" class="card"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxb1CMlGfwdl0-ZLumNPMhQ5gc8nVHTAk",
        authDomain: "configurator-3f340.firebaseapp.com",
        databaseURL: "https://configurator-3f340-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "configurator-3f340",
        storageBucket: "configurator-3f340.firebasestorage.app",
        messagingSenderId: "412615987048",
        appId: "1:412615987048:web:18902eae53f76637b490dd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userName = localStorage.getItem('pokerUser') || prompt("Представьтесь (имя для истории):") || "Мастер";
    localStorage.setItem('pokerUser', userName);

    // Отрисовка интерфейса
    const container = document.getElementById('app-fields');
    const fields = [
        { id: 'podstole', name: 'Подстолье', type: 'toggle' },
        { id: 'stol', name: 'Стол', type: 'input' },
        { id: 'bort', name: 'Борт', type: 'input' },
        { id: 'nakladka', name: 'Накладка', type: 'input' },
        { id: 'fleet', name: 'Флот', type: 'toggle' },
        { id: 'light', name: 'Подсветка', type: 'select', opts: ['Выкл', 'Снаружи', 'Внутри', 'По кругу'] },
        { id: 'cups', name: 'Подстаканники', type: 'select', opts: ['Стандарт', 'Не стандарт'] }
    ];

    fields.forEach(f => {
        let html = `<div class="card"><label class="small fw-bold text-muted">${f.name}</label>`;
        if (f.type === 'toggle') html += `<div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="${f.id}"></div>`;
        else if (f.type === 'select') {
            html += `<select class="form-select" id="${f.id}">${f.opts.map(o => `<option>${o}</option>`).join('')}</select>`;
        } else {
            html += `<input class="form-control" id="${f.id}" placeholder="...">`;
        }
        container.innerHTML += html + `</div>`;
    });

    function saveAll() {
        let data = { timestamp: Date.now(), user: userName, details: {} };
        fields.forEach(f => {
            const el = document.getElementById(f.id);
            data.details[f.name] = (f.type === 'toggle' ? (el.checked ? 'Да' : 'Нет') : el.value);
        });
        
        db.ref('history').push(data);
        alert("Конфигурация сохранена в базу!");
    }

    db.ref('history').limitToLast(5).on('value', (snapshot) => {
        const log = document.getElementById('history-log');
        log.innerHTML = '';
        snapshot.forEach(child => {
            const v = child.val();
            log.innerHTML += `<div class="history-item"><b>${v.user}</b> (${new Date(v.timestamp).toLocaleTimeString()}): ${JSON.stringify(v.details).replace(/[{}"']/g, '').replace(/,/g, ', ')}</div>`;
        });
    });
</script>
</body>
</html>
