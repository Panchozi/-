<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f8f9fa; padding-bottom: 80px; }
        .card { border-radius: 15px; margin-bottom: 10px; padding: 15px; }
        .history-item { font-size: 0.8rem; border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h4>Конфигуратор стола</h4>
    <div id="app-fields"></div>
    <button class="btn btn-primary w-100 mt-3" onclick="saveAll()">СОХРАНИТЬ КОНФИГУРАЦИЮ</button>
    
    <hr>
    <h5>История изменений:</h5>
    <div id="history-log" class="card"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxb1CMlGfwdl0-ZLumNPMhQ5gc8nVHTAk",
        authDomain: "configurator-3f340.firebaseapp.com",
        databaseURL: "https://configurator-3f340-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "configurator-3f340",
        storageBucket: "configurator-3f340.firebasestorage.app",
        messagingSenderId: "412615987048",
        appId: "1:412615987048:web:18902eae53f76637b490dd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Вводим имя при входе
    const userName = localStorage.getItem('pokerUser') || prompt("Введите ваше имя:");
    localStorage.setItem('pokerUser', userName);

    const fields = ['Подстолье', 'Стол', 'Борт', 'Накладка', 'Флот', 'Подсветка', 'Подстаканники'];
    
    // Отрисовка полей
    const container = document.getElementById('app-fields');
    fields.forEach(f => {
        container.innerHTML += `<div class="card">${f}: <input class="form-control" id="val-${f}"></div>`;
    });

    // Функция сохранения
    function saveAll() {
        let data = { timestamp: Date.now(), user: userName, details: {} };
        fields.forEach(f => {
            data.details[f] = document.getElementById(`val-${f}`).value;
        });
        
        db.ref('history').push(data); // Записываем в историю
        db.ref('current').set(data);   // Обновляем текущее состояние
        alert("Сохранено!");
    }

    // Загрузка истории
    db.ref('history').limitToLast(5).on('value', (snapshot) => {
        const log = document.getElementById('history-log');
        log.innerHTML = '';
        snapshot.forEach(child => {
            const val = child.val();
            log.innerHTML += `<div class="history-item"><b>${val.user}</b>: ${new Date(val.timestamp).toLocaleTimeString()}</div>`;
        });
    });
</script>
</body>
</html>
